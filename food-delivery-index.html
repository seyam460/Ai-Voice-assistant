<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Delivery - Home</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="navbar-content">
          <div class="logo">🍔 FoodHub</div>
          <div class="nav-links">
            <a href="index.html" class="nav-link active">Home</a>
            <a href="orders.html" class="nav-link">Orders</a>
            <a href="cart.html" class="nav-link cart-link">
              🛒 <span id="cart-count" class="cart-count">0</span>
            </a>
            <a id="logout-btn" href="#" class="nav-link" style="display: none"
              >Logout</a
            >
            <a id="login-link" href="login.html" class="nav-link">Login</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="hero">
      <div class="hero-content">
        <h1>Hungry? Order from your favorite restaurants</h1>
        <p>Fast delivery • Great prices • Quality food</p>
        <div class="search-container">
          <input
            type="text"
            id="search-input"
            placeholder="Search restaurants..."
          />
          <button id="search-btn" class="btn-search">🔍 Search</button>
        </div>
      </div>
    </div>

    <div class="container">
      <section class="filters">
        <h2>Filter By</h2>
        <div class="filter-group">
          <label
            ><input type="checkbox" class="cuisine-filter" value="Italian" />
            Italian</label
          >
          <label
            ><input type="checkbox" class="cuisine-filter" value="American" />
            American</label
          >
          <label
            ><input type="checkbox" class="cuisine-filter" value="Japanese" />
            Japanese</label
          >
          <label
            ><input type="checkbox" class="cuisine-filter" value="Mexican" />
            Mexican</label
          >
        </div>
        <div class="filter-group">
          <label
            >Min Rating:
            <input
              type="range"
              id="rating-filter"
              min="0"
              max="5"
              step="0.1"
              value="0"
          /></label>
          <span id="rating-value">0★</span>
        </div>
        <button id="clear-filters" class="btn-secondary">Clear Filters</button>
      </section>

      <section class="restaurants-section">
        <h2>Popular Restaurants</h2>
        <div id="restaurants-list" class="restaurants-grid">
          <p>Loading restaurants...</p>
        </div>
      </section>
    </div>

    <footer class="footer">
      <p>
        &copy; 2024 FoodHub. All rights reserved. | Fast & Fresh Food Delivery
      </p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
