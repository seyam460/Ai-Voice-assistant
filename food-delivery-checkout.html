<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">🍔 FoodHub</div>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="orders.html" class="nav-link">Orders</a>
                    <a href="cart.html" class="nav-link cart-link">
                        🛒 <span id="cart-count" class="cart-count">0</span>
                    </a>
                    <a id="logout-btn" href="#" class="nav-link" style="display: none;">Logout</a>
                    <a id="login-link" href="login.html" class="nav-link">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Checkout</h1>

        <div class="checkout-container">
            <div class="checkout-form">
                <form id="checkout-form">
                    <div class="form-section">
                        <h3>Delivery Address</h3>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="full-name" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="address" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" id="city" required>
                            </div>
                            <div class="form-group">
                                <label>Zip Code</label>
                                <input type="text" id="zip" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Payment Method</h3>
                        <div class="form-group">
                            <label>
                                <input type="radio" name="payment" value="credit-card" checked> Credit Card
                            </label>
                            <label>
                                <input type="radio" name="payment" value="debit-card"> Debit Card
                            </label>
                            <label>
                                <input type="radio" name="payment" value="paypal"> PayPal
                            </label>
                            <label>
                                <input type="radio" name="payment" value="cash"> Cash on Delivery
                            </label>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Special Instructions</h3>
                        <textarea id="special-instructions" placeholder="Add any special requests here..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary btn-large">Place Order</button>
                </form>
            </div>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div id="order-items">
                    <!-- Items will be populated -->
                </div>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee:</span>
                    <span id="summary-delivery">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="summary-tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="summary-total">$0.00</span>
                </div>
                <a href="cart.html" class="btn-secondary" style="display: block; text-align: center; margin-top: 10px;">← Back to Cart</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 FoodHub. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
