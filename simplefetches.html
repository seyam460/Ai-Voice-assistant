<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no,
    initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-4">User posts</h2>

      <div id="loading" class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p>Loading...</p>
      </div>

      <table
        class="table table-bordered table-striped d-none border-3 border-primary"
        id="datatable"
      >
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Body</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <br />

    <div class="container mt-5">
      <div class="row border border-primary p-3" id="row">
        <div class="col-md-4 p-3 border-primary"></div>
      </div>
    </div>

    <script>
      let tablebody = document.getElementById("table-body");
      let datatable = document.getElementById("datatable");
      let loading = document.getElementById("loading");
      let row = document.getElementById("row");

      function fetchdata() {
        fetch("https://jsonplaceholder.typicode.com/posts")
          .then((Response) => Response.json())
          .then((data) => {
            loading.classList.add("d-none");
            datatable.classList.remove("d-none");

            data.reverse().forEach((post) => {
              let col = `<div class="col-md-4">
              <div class="card">
              <div class="card-body">
                <h5 class="card-title">${post.title}</h5>
                <p class="card-text">${post.body}</p>
              </div>
              </div>
              </div>`;

              row.innerHTML = col + row.innerHTML;
            });
          });
      }

      fetchdatarow();

      function fetchdatarow() {
        fetch("https://jsonplaceholder.typicode.com/posts")
          .then((Response) => Response.json())
          .then((data) => {
            data.reverse().forEach((post) => {
              let row = `<tr>
                                <td>${post.id}</td>
                                <td>${post.title}</td>
                                <td>${post.body}</td>
                            </tr>`;

              tablebody.innerHTML = row + tablebody.innerHTML;
            });
          });
      }

      fetchdata();
    </script>
  </body>
</html>
