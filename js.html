<!doctype html>
<html lang="en">
  <head>
    <title>JavaScript</title>
  </head>
  <style>
    .new {
      color: red;
    }
    body {
      padding: 50px;
      margin: 50px;
      color: black;
      background-color: white;
    }
    body.dark-mode {
      color: white;
      background-color: black;
    }
  </style>
  <body>
    <h1 id="Title">JavaScript</h1>
    <p class="new">this is new era of bangladesh</p>
    <img
      id="Logo"
      src="https://cdn.ostad.app/public/upload/2024-03-20T04-26-32.799Z-ostad_logo_light@512x%20(2).png"
      alt="ostad logo"
      width="200px"
      height="200px"
    />
    <div style="display: flex; flex-direction: column">
      <a href="#">Link To USA </a>
      <a href="#">Link To Bangladsh </a>
    </div>

    <button id="cng-btn">Change Background</button>
    <button id="theme-btn">Toggle theme</button>

    <h1>Counter app</h1>
    <h2 id="display">0</h2>
    <div>
      <button id="increase">Increase</button>
      <button id="decrease">Decrease</button>
    </div>

    <div>EMI calculator</div>
    <h1 id="result"></h1>
    <form id="emi-form">
      <label>Loan amount </label>
      <input type="number" name="loan-amount" id="loan-amount" />
      <label>Interest per month </label>
      <input type="number" name="interest-rate" id="interest-rate" />
      <label> Time </label>
      <input type="number" name="time-period" id="time-period" />
      <button type="submit">Calculate</button>
    </form>
    <h1 class="title">Hello</h1>
    <h2 id="sub">SUB</h2>
    <p>This is the first time</p>
    <p>This is the second time</p>
    <p>This is the third time</p>

    <script src="js.js"></script>
  </body>
</html>
