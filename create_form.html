<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 2</title>
    <link rel="stylesheet" href="./bootstrap.css" />
  </head>
  <body>
    <main class = "container p-3 d-flex justify-content-center align-item-center flex-column mt-6 bg-warning-subtle border border-capacity-75 border-2 border-primary rounded">

        <h1 class = "text-center border-bottom border-success">
            Personal Information  form </h1>
            <form class = "border d-flex flex-column gap-3 border-secondary rounded w-100 p-3">
                <div class = "form-floating w-100">
                    <input type = "file" class = "form-control" id = "profilepic" />
                    <label for = "profilepic" class = "">Profile Picture</label>
                </div>

                <div class = "progress" role = "progressbar">
                    <div class = "progressbar" style = "width: 25%"></div>
                </div>

                <!-- Name section -->
                    <div class = "d-flex gap-3 w-100">
                        <div class = "form-floating w-50">
                            <input type = "text" class = "form-control" id = "firstname" placeholder = "rafi" />
                            <label for = "firstname">First Name</label>
                        </div>
                        <div class = "form-floating w-50">
                            <input type = "text" class = "form-control" id = "lastname" placeholder = "ahmed" />
                            <label for = "lastname">Last Name</label>
                        </div>
                    </div>


                    <!-- Email Section -->
                     <div class = "form-floating w-100">
                        <input type = "email" class = "form-control" id = "email" placeholder = "rafi@example.com" />
                        <label for = "email" class = "">Email</label>
                     </div>

                     <!-- number and location section-->
                      <div class = "d-flex gap-3 w-100">
                        <div class = "form-floating w-50">
                            <input type = "number" class = "form-control" id = "Phonenumber" placeholder = "01700000000" />
                            <label for = "number">Mobile Number</label>
                        </div>
                        <div class = "form-floating w-50">
                            <select id = "location" class = "form-select">
                                <option value = "">Selected your Location</option>
                                <option value = "dhaka">Dhaka</option>
                                <option value = "chittagong">Chittagong</option>
                                <option value = "khulna">Khulna</option>
                                <option value = "sylhet">Sylhet</option>
                                <option value = "barishal">Barishal</option>
                                <option value = "rangpur">Rangpur</option>
                                <option value = "mymensingh">Mymensingh</option>
                            </select>
                            </div>
                        </div>

                        <!-- bio section -->
                         <div class = "form-floating w-100">
                             <textarea class= "form-control" id  = "bio" placeholder = "Write about yourself" style = "height: 100px row = "3"></textarea>
                                <label for = "bio">Bio</label>
                                </div>


                        <!-- Merital status section -->
                            <div class = "d-flex gap-3 w-100">
                                <div class = "form-floating w-50">
                                    <select id = "maritalstatus" class = "form-select">
                                        <option value = "">Select your Marital Status</option>
                                        <option value = "single">Single</option>
                                        <option value = "married">Married</option>
                                        <option value = "divorced">Divorced</option>
                                        <option value = "widowed">Widowed</option>
                                    </select>
                                </div>

                        <!-- classification section -->
                                <div class = "w-100">
                                <p class = "form-text">Classification check</p>
                                <div class = "form-check">
                                <input 
                                   class = "form-check-input"
                                   type = "radio"
                                   name = "Student"
                                   id = "student"
                                   />
                                   <label class="form-check-label" for= "student">Student</label>
                                   </div>
                                <div class = "w-100">
                                <div class = "form-check">
                                <input 
                                   class = "form-check-input"
                                   type = "radio"
                                   name = "employee"
                                   id = "employee"
                                   />
                                   <label class ="form-check-label" for= "employee">employee</label>
                                   </div>
                                   
                                <div class = "w-100">
                                <div class = "form-check">
                                <input 
                                    class = "form-check-input"
                                    type = "radio"
                                    name = "Doctor"
                                    id = "doctor"
                                    />
                                    <label class = "form-check-label" for = "doctor">Doctor</label>
                                    </div>
                                    </div>
                            

                            <!-- Available for job -->
                             <div class = "w-100 form-check form switch justify-content-center align-item-center">
                             <p class = "form-text">Job availability</p>
                                <input 
                                  class = "form-check-input"
                                  type = "checkbox"
                                  role = "switch"
                                  id = "jobready"
                                  />
                                    <label class = "form-check-label" for = "jobready">Available for job</label>
                                </div>


                        <!-- Agree to terms and conditions -->
                              <div class="form-check w-100 justify-content-start align-items-center">
                                <input 
                                    class = "form-check-input"
                                    type = "checkbox"
                                    value = ""
                                    id = "agreeterms"
                                    />
                                    <label class = "form-check-label" for = "agreeterms">I agree to the terms and conditions</label>
                                </div>

                                <div>

                                    <button 
                                        type = "submit"
                                        class = "btn btn-primary"
                                        data-bs-toggle = "button"
                                        data-bs-target = "#confirmModal">
                                        submit</button>
                                        </div>
                                        </form>
                            <!-- confiramation model-->
                             <div class="model fade" id= "confirmModal" tabindex = "-1" aria-labelledby = "confirmModalLabel" aria-hidden = "true">
                                <div class = "model-dialog">
                                    <div class = "model-content">
                                        <div class = "model-header">
                                            <h5 class = "model-title" id = "confirmModalLabel">Confirm Submission</h5>
                                            <button type = "button" class = "btn-close" data-bs-dismiss = "modal" aria-label = "Close"></button>
                                        </div>
                                        <div class = "model-body">
                                            Are you sure you want to submit the form?
                                        </div>
                                        <div class = "model-footer">
                                            <button type = "button" class = "btn btn-secondary" data-bs-dismiss = "modal">Cancel</button>
                                            <button type = "button" class = "btn btn-primary">Confirm</button>
                                        </div>
                                    </div>
                                </div>




                                    
                                





                    



                    








            </main>
            <script src="./bootstrap.js"></script>







  </body>
</html>
