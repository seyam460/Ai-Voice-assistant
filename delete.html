<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no,
    initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Delete Method</title>
  </head>
  <body>
    <button onclick="articleDelete()">Delete</button>
    <div id="deletetresult"></div>
  </body>
  <script>
    function articleDelete() {
      const xhr = new XMLHttpRequest();
      xhr.open("DELETE", "https://jsonplaceholder.typicode.com/posts/1", true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState == 4 && xhr.status == 204) {
          console.log(xhr.response);
          document.getElementById("deletetresult").innerText =
            "article successfully deleted";
        }
      };

      xhr.send();
    }
  </script>
</html>
