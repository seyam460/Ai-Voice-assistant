<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">🍔 FoodHub</div>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="orders.html" class="nav-link">Orders</a>
                    <a href="cart.html" class="nav-link cart-link active">
                        🛒 <span id="cart-count" class="cart-count">0</span>
                    </a>
                    <a id="logout-btn" href="#" class="nav-link" style="display: none;">Logout</a>
                    <a id="login-link" href="login.html" class="nav-link">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Shopping Cart</h1>
        
        <div class="cart-content">
            <div class="cart-items-section">
                <table id="cart-table" class="cart-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Cart items will be populated -->
                    </tbody>
                </table>
                <p id="empty-cart-msg" class="empty-message">Your cart is empty</p>
            </div>

            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee:</span>
                    <span id="delivery-fee">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <input type="text" id="coupon-input" placeholder="Enter coupon code" class="coupon-input">
                <button id="apply-coupon" class="btn-secondary">Apply Coupon</button>
                <a href="checkout.html" id="checkout-btn" class="btn-primary" style="display: block; margin-top: 10px; text-align: center;">Proceed to Checkout</a>
                <a href="index.html" class="btn-secondary" style="display: block; margin-top: 10px; text-align: center;">Continue Shopping</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 FoodHub. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
